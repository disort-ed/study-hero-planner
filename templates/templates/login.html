<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💥 Study Hero - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap');
        
        :root {
            --comic-red: #FF3B30;
            --comic-yellow: #FFCC00;
            --comic-dark: #1A1A2E;
            --comic-cream: #FFF5E6;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--comic-cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border: 4px solid var(--comic-dark);
            box-shadow: 8px 8px 0px var(--comic-dark);
            max-width: 400px;
            width: 90%;
        }
        
        .login-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: var(--comic-dark);
            text-align: center;
        }
        
        .login-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .login-form input {
            width: 100%;
            padding: 15px;
            border: 3px solid var(--comic-dark);
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            margin-bottom: 20px;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--comic-yellow);
            border: 3px solid var(--comic-dark);
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .login-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 6px 6px 0px var(--comic-dark);
        }
        
        .error-msg {
            background: var(--comic-red);
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">💥 STUDY HERO</h1>
        <p class="login-subtitle">⚡ Enter your secret code ⚡</p>
        
        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}
        
        <form class="login-form" method="POST">
            <input type="password" name="password" placeholder="🔑 Enter password..." required>
            <button type="submit" class="login-btn">🚀 ENTER</button>
        </form>
        
        <p style="text-align:center; margin-top:15px; font-size:0.8rem; color:#999;">
            Default password: studyhero2024
        </p>
    </div>
</body>
</html>
